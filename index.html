<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Pretendard', sans-serif;
  background:#f1f5f9;
}

/* 헤더 */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
}
.logo{height:26px;}
.phone{
  font-weight:600;
  color:#4f46e5;
}

/* 타이틀 */
.hero{
  text-align:center;
  margin-top:20px;
}
.hero h1{
  font-size:36px;
  margin:0;
}
.hero p{
  color:#6b7280;
}

/* 카드 영역 */
.container{
  max-width:1100px;
  margin:60px auto;
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:30px;
}

/* 카드 */
.card{
  border-radius:30px;
  padding:50px 30px;
  text-align:center;
  transition:0.3s;
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
  cursor:pointer;
}
.card:hover{
  transform:translateY(-12px);
  box-shadow:0 30px 70px rgba(0,0,0,0.15);
}

/* 배경 */
.remote{background:linear-gradient(145deg,#e0e7ff,#c7d2fe);}
.video{background:linear-gradient(145deg,#dcfce7,#bbf7d0);}
.error{background:linear-gradient(145deg,#fef3c7,#fde68a);}

/* 아이콘 */
.icon{
  width:120px;
  margin:0 auto 25px;
  display:block;
  filter: drop-shadow(0 15px 20px rgba(0,0,0,0.15));
}

/* 텍스트 */
.title{
  font-size:22px;
  font-weight:700;
  margin-bottom:10px;
}
.desc{
  font-size:14px;
  color:#6b7280;
  margin-bottom:25px;
}

/* 버튼 */
.btn{
  width:50px;
  height:50px;
  border-radius:50%;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto;
  font-size:18px;
  box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

/* FAQ */
.faq{
  max-width:900px;
  margin:50px auto;
}
.faq h2{
  text-align:center;
}
.faq-item{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}
.faq-answer{
  display:none;
  margin-top:10px;
}

/* 모달 */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
}
.modal-content{
  background:white;
  padding:30px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
}
.modal button{
  margin-top:15px;
  padding:8px 20px;
  border:none;
  border-radius:10px;
  background:#4f46e5;
  color:white;
  cursor:pointer;
}

/* 모바일 */
@media(max-width:900px){
  .container{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- 헤더 -->
<div class="header">
  <img src="techheim_logo.png" class="logo">
  <div class="phone">📞 1588-6620</div>
</div>

<!-- 타이틀 -->
<div class="hero">
  <h1>고객지원센터</h1>
  <p>원하시는 서비스를 선택해주세요</p>
</div>

<!-- 카드 -->
<div class="container">

  <!-- 원격지원 -->
  <div class="card remote" onclick="downloadAndGuide()">
    <img src="remote.png" class="icon">
    <div class="title">원격지원</div>
    <div class="desc">담당자가 원격으로 문제를 해결해드립니다</div>
    <div class="btn">→</div>
  </div>

  <!-- 사용방법 -->
  <div class="card video" onclick="window.open('https://www.youtube.com/watch?v=jddcmN0YrJI')">
    <img src="video.png" class="icon">
    <div class="title">사용방법</div>
    <div class="desc">CD복사 및 Viewer 사용법 영상</div>
    <div class="btn">→</div>
  </div>

  <!-- 오류 해결 -->
  <div class="card error" onclick="openChat()">
    <img src="error.png" class="icon">
    <div class="title">오류 해결</div>
    <div class="desc">챗봇으로 빠르게 해결하세요</div>
    <div class="btn">→</div>
  </div>

</div>

<!-- FAQ -->
<div class="faq">
  <h2>자주 묻는 질문</h2>

  <div class="faq-item" onclick="toggleFAQ(this)">
    Q. CD 복사 방법은?
    <div class="faq-answer">
      https://www.youtube.com/watch?v=jddcmN0YrJI
    </div>
  </div>

  <div class="faq-item" onclick="toggleFAQ(this)">
    Q. Viewer 실행이 안됩니다
    <div class="faq-answer">
      챗봇 또는 원격지원을 이용해주세요
    </div>
  </div>
</div>

<!-- 모달 -->
<div id="guideModal" class="modal">
  <div class="modal-content">
    <h3>안내</h3>
    <p>파일 실행 후 표시되는<br>4자리 번호를 상담원에게 알려주세요.</p>
    <button onclick="closeModal()">확인</button>
  </div>
</div>

<!-- 스크립트 -->
<script>
function downloadAndGuide(){
  window.open('https://www.15886620.co.kr/download/techheim-1-80-443.exe');

  setTimeout(function(){
    document.getElementById('guideModal').style.display='flex';
  }, 500);
}

function closeModal(){
  document.getElementById('guideModal').style.display='none';
}

function toggleFAQ(el){
  var a = el.querySelector('.faq-answer');
  a.style.display = a.style.display === 'block' ? 'none' : 'block';
}

function openChat(){
  if(typeof Tawk_API !== 'undefined'){
    Tawk_API.maximize();
  } else {
    alert('챗봇 로딩 중입니다.');
  }
}
</script>

<!-- Chat Bot -->
<iframe
 src="https://udify.app/chatbot/muP3lKXGJ5mFEkJO"
 style="width: 100%; height: 100%; min-height: 700px"
 frameborder="0"
 allow="microphone">
</iframe>

</body>
</html>
